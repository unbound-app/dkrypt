services:
  api:
    build: ./api
    image: dkrypt
    container_name: dkrypt
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      PORT: 8080
      BIND_HOST: 127.0.0.1
    volumes:
      - appstore-config:/root/.ipadecrypt
      - ipa-tmp:/data/tmp
      - state:/data/state
      - ${HOME}/.ssh/id_ed25519_ipad:/root/.ssh/id_ed25519:ro

volumes:
  appstore-config:
    name: dkrypt_appstore-config
  ipa-tmp:
    name: dkrypt_ipa-tmp
  state:
    name: dkrypt_state
